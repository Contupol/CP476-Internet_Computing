<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <title>Settings page</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="../style.css" />
</head>

<body style="display: flex; flex-direction: column; height: 95%;">
    <header>
        <h1
            style="margin: auto; padding: 10px; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">
            Settings</h1>
    </header>
    <section
        style="display: flex; flex-direction: row; height: 100%; border: 1px solid black; margin-left: 20px; margin-right: 20px;">
        <div style="width: 70%; border: 1px solid black;">
            <!--summary statistics of user finances-->
            <div style="height: 90%; width: 95%; border: 1px solid black">
                <canvas id="savingsTrendChart"></canvas>
            </div>
        </div>
        <aside style="width: 30%; border: 1px solid black;">
            <form method="post" action="./script.js"
                style="height: 100%; display: flex; flex-direction: column; justify-content: center;">
                <div style="width: 70%; display: flex; flex-direction: column; margin-top: auto;">
                    <label for="category" style="font-size: 16px;">Pick a budget:</label>
                    <select name="category" id="category" style="text-align: center;">
                        <option value="">Budget</option>
                    </select><br>
                    <label for="goal_name">Goal name:</label>
                    <input type="text" id="goal_name">
                    <label for="goal_desc">Goal description:</label>
                    <input type="text" id="goal_desc" style="width: 90%; border-radius: 10px;">
                    <!--Goals-->
                    </input><br>
                    <label for="period">Change period:</label>
                    <select name="goal_period" id="period" style="text-align: center;">
                        <option value="Weekly">Weekly</option>
                        <option value="Monthly">Monthly</option>
                        <option value="Yearly">Yearly</option>
                    </select>
                    <label for="goal_budget">Goal budget:</label>
                    <input id="goal_budget" type="number"><br>
                </div>
                <div style="display: flex; flex-direction: column; margin-top: auto;">
                    <button class="button" type="button" style="background-color: grey; width: 100%;"
                        onclick="createBudget()">Create Budget</button>
                    <button class="button" type="button" style="background-color: grey; width: 100%;"
                        onclick="deleteBudget()">Delete Budget</button>
                    <button class="button" type="button" style="background-color: grey; width: 100%;"
                        onclick="secondPage()">Main Page</button>

                </div>
            </form>
        </aside>
    </section>
</body>
<script src="../script.js"></script>
